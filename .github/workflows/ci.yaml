name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint-python:
    name: Python Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint order-svc
        run: ruff check apps/order-svc/

      - name: Lint inventory-svc
        run: ruff check apps/inventory-svc/

  test-python:
    name: Python Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint-python
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install order-svc dependencies
        run: pip install -r apps/order-svc/requirements.txt -r apps/order-svc/requirements-dev.txt

      - name: Test order-svc
        working-directory: apps/order-svc
        run: pytest --tb=short -q

      - name: Install inventory-svc dependencies
        run: pip install -r apps/inventory-svc/requirements.txt -r apps/inventory-svc/requirements-dev.txt

      - name: Test inventory-svc
        working-directory: apps/inventory-svc
        run: pytest --tb=short -q

  lint-go:
    name: Go Lint (go vet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: go vet
        working-directory: apps/frontend-svc
        run: go vet ./...

  test-go:
    name: Go Tests
    runs-on: ubuntu-latest
    needs: lint-go
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run tests
        working-directory: apps/frontend-svc
        run: go test -v -race ./...

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: "3.14.0"

      - name: Add Helm repos
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo add fluent https://fluent.github.io/helm-charts
          helm repo add jaegertracing https://jaegertracing.github.io/helm-charts
          helm repo add open-telemetry https://open-telemetry.github.io/opentelemetry-helm-charts
          helm repo add chaos-mesh https://charts.chaos-mesh.org
          helm repo update

      - name: Lint kube-prometheus-stack values
        run: |
          helm lint --values infra/helm/kube-prometheus-stack/values.yaml \
            prometheus-community/kube-prometheus-stack || true

      - name: Lint otel-collector values
        run: |
          helm lint --values infra/helm/otel-collector/values.yaml \
            open-telemetry/opentelemetry-collector || true

  docker-build:
    name: Docker Build (no push)
    runs-on: ubuntu-latest
    needs: [test-python, test-go]
    strategy:
      matrix:
        service:
          - name: frontend-svc
            path: apps/frontend-svc
          - name: order-svc
            path: apps/order-svc
          - name: inventory-svc
            path: apps/inventory-svc
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.path }}
          push: false
          tags: ghcr.io/${{ github.repository_owner }}/mini-obs-${{ matrix.service.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
