server {
    listen 3001;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    resolver 10.96.0.10 valid=10s;

    gzip on;
    gzip_types text/css application/javascript application/json;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location /health {
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    location /proxy/prometheus/ {
        set $upstream_prometheus kube-prometheus-stack-prometheus.monitoring.svc.cluster.local;
        rewrite ^/proxy/prometheus/(.*) /$1 break;
        proxy_pass http://$upstream_prometheus:9090;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    location /proxy/jaeger/ {
        set $upstream_jaeger jaeger-query.tracing.svc.cluster.local;
        rewrite ^/proxy/jaeger/(.*) /$1 break;
        proxy_pass http://$upstream_jaeger:16686;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    location /proxy/frontend/ {
        set $upstream_frontend frontend-svc.observability-demo.svc.cluster.local;
        rewrite ^/proxy/frontend/(.*) /$1 break;
        proxy_pass http://$upstream_frontend:8080;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 15s;
    }

    location /proxy/order/ {
        set $upstream_order order-svc.observability-demo.svc.cluster.local;
        rewrite ^/proxy/order/(.*) /$1 break;
        proxy_pass http://$upstream_order:8081;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 15s;
    }

    location /proxy/inventory/ {
        set $upstream_inventory inventory-svc.observability-demo.svc.cluster.local;
        rewrite ^/proxy/inventory/(.*) /$1 break;
        proxy_pass http://$upstream_inventory:8082;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 15s;
    }

    location /proxy/grafana/ {
        set $upstream_grafana kube-prometheus-stack-grafana.monitoring.svc.cluster.local;
        rewrite ^/proxy/grafana/(.*) /$1 break;
        proxy_pass http://$upstream_grafana:80;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }
}
