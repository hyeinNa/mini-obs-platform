kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
      - containerPort: 30000
        hostPort: 3000
        protocol: TCP
      - containerPort: 30001
        hostPort: 16686
        protocol: TCP
      - containerPort: 30002
        hostPort: 8090
        protocol: TCP
      - containerPort: 30003
        hostPort: 3001
        protocol: TCP
  - role: worker
  - role: worker
