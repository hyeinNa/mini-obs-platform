apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-custom-dashboards
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  red-metrics.json: |
    {
      "uid": "red-metrics",
      "title": "RED 메트릭 — 서비스 개요",
      "tags": ["observability", "RED", "mini-obs"],
      "timezone": "browser",
      "refresh": "10s",
      "time": { "from": "now-30m", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "service",
            "type": "custom",
            "current": { "text": "All", "value": "$__all" },
            "options": [
              { "text": "All", "value": "$__all", "selected": true },
              { "text": "frontend-svc", "value": "frontend-svc" },
              { "text": "order-svc", "value": "order-svc" },
              { "text": "inventory-svc", "value": "inventory-svc" }
            ],
            "includeAll": true,
            "multi": true,
            "query": "frontend-svc,order-svc,inventory-svc"
          }
        ]
      },
      "panels": [
        {
          "id": 1, "title": "총 요청 수", "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 8, "x": 0, "y": 0 },
          "targets": [{ "expr": "sum(http_requests_total)", "refId": "A" }],
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "blue", "value": null }] } } }
        },
        {
          "id": 2, "title": "생성된 주문", "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 8, "x": 8, "y": 0 },
          "targets": [{ "expr": "sum(orders_created_total)", "refId": "A" }],
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "green", "value": null }] } } }
        },
        {
          "id": 3, "title": "활성 타겟", "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 8, "x": 16, "y": 0 },
          "targets": [{ "expr": "count(up == 1)", "refId": "A" }],
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "orange", "value": null }] } } }
        },
        {
          "id": 4, "title": "요청률 (Rate)", "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 7, "w": 24, "x": 0, "y": 4 },
          "targets": [{ "expr": "sum(rate(http_requests_total{job=~\"$service\"}[5m])) by (job)", "legendFormat": "{{job}}", "refId": "A" }],
          "fieldConfig": { "defaults": { "unit": "reqps" } }
        },
        {
          "id": 5, "title": "에러율 (Error Rate)", "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 7, "w": 24, "x": 0, "y": 11 },
          "targets": [{ "expr": "sum(rate(http_requests_total{job=~\"$service\",status_code=~\"5..\"}[5m])) by (job)", "legendFormat": "{{job}}", "refId": "A" }],
          "fieldConfig": { "defaults": { "unit": "reqps", "color": { "mode": "palette-classic" } } }
        },
        {
          "id": 6, "title": "P99 레이턴시 (Duration)", "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 7, "w": 24, "x": 0, "y": 18 },
          "targets": [{ "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job=~\"$service\"}[5m])) by (le, job))", "legendFormat": "{{job}} P99", "refId": "A" }],
          "fieldConfig": { "defaults": { "unit": "s" } }
        }
      ],
      "schemaVersion": 39
    }
  traces.json: |
    {
      "uid": "traces",
      "title": "분산 트레이싱 — Tempo",
      "tags": ["observability", "traces", "tempo"],
      "timezone": "browser",
      "refresh": "10s",
      "time": { "from": "now-30m", "to": "now" },
      "panels": [
        {
          "id": 1, "title": "트레이스 검색 (TraceQL)", "type": "table",
          "datasource": { "type": "tempo", "uid": "tempo" },
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 0 },
          "targets": [{ "queryType": "nativeSearch", "serviceName": "frontend-svc", "limit": 20, "refId": "A" }]
        },
        {
          "id": 2, "title": "서비스 그래프 (Service Map)", "type": "nodeGraph",
          "datasource": { "type": "tempo", "uid": "tempo" },
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 10 },
          "targets": [{ "queryType": "serviceMap", "refId": "A" }]
        },
        {
          "id": 3, "title": "레이턴시 분포 (P50 / P99)", "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 7, "w": 24, "x": 0, "y": 20 },
          "targets": [
            { "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, job))", "legendFormat": "{{job}} P50", "refId": "A" },
            { "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, job))", "legendFormat": "{{job}} P99", "refId": "B" }
          ],
          "fieldConfig": { "defaults": { "unit": "s" } }
        }
      ],
      "schemaVersion": 39
    }
  logs.json: |
    {
      "uid": "logs",
      "title": "로그 탐색기 — Loki",
      "tags": ["observability", "logs", "loki"],
      "timezone": "browser",
      "refresh": "10s",
      "time": { "from": "now-30m", "to": "now" },
      "panels": [
        {
          "id": 1, "title": "로그 볼륨", "type": "timeseries",
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 5, "w": 24, "x": 0, "y": 0 },
          "targets": [{ "expr": "sum by (namespace) (count_over_time({namespace=\"observability-demo\"}[1m]))", "refId": "A" }],
          "fieldConfig": { "defaults": { "custom": { "drawStyle": "bars", "fillOpacity": 50 } } }
        },
        {
          "id": 2, "title": "앱 로그 스트림", "type": "logs",
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 12, "w": 24, "x": 0, "y": 5 },
          "targets": [{ "expr": "{namespace=\"observability-demo\"}", "refId": "A" }],
          "options": { "showTime": true, "showLabels": true, "wrapLogMessage": true, "enableLogDetails": true, "sortOrder": "Descending" }
        },
        {
          "id": 3, "title": "에러 로그", "type": "logs",
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 17 },
          "targets": [{ "expr": "{namespace=\"observability-demo\"} |~ \"error|Error|ERROR\"", "refId": "A" }],
          "options": { "showTime": true, "showLabels": true, "wrapLogMessage": true, "enableLogDetails": true, "sortOrder": "Descending" }
        }
      ],
      "schemaVersion": 39
    }
