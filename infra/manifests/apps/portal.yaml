---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal
  namespace: observability-demo
  labels:
    app: portal
    app.kubernetes.io/part-of: mini-obs-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portal
  template:
    metadata:
      labels:
        app: portal
    spec:
      containers:
        - name: portal
          image: ghcr.io/owner/mini-obs-portal:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 3
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: portal
  namespace: observability-demo
  labels:
    app: portal
spec:
  selector:
    app: portal
  ports:
    - name: http
      port: 3001
      targetPort: 3001
      protocol: TCP
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: portal-nodeport
  namespace: observability-demo
  labels:
    app: portal
spec:
  selector:
    app: portal
  ports:
    - name: http
      port: 3001
      targetPort: 3001
      nodePort: 30003
      protocol: TCP
  type: NodePort
