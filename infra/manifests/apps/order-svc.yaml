---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-svc
  namespace: observability-demo
  labels:
    app: order-svc
    app.kubernetes.io/part-of: mini-obs-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-svc
  template:
    metadata:
      labels:
        app: order-svc
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: order-svc
          image: ghcr.io/owner/mini-obs-order-svc:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          env:
            - name: INVENTORY_SVC_URL
              value: "http://inventory-svc.observability-demo.svc.cluster.local:8082"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "otel-collector-opentelemetry-collector.tracing:4317"
            - name: OTEL_SERVICE_NAME
              value: "order-svc"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: order-svc
  namespace: observability-demo
  labels:
    app: order-svc
spec:
  selector:
    app: order-svc
  ports:
    - name: http
      port: 8081
      targetPort: 8081
      protocol: TCP
  type: ClusterIP

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: order-svc
  namespace: observability-demo
  labels:
    app: order-svc
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: order-svc
  namespaceSelector:
    matchNames:
      - observability-demo
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
