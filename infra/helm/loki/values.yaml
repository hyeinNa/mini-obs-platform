## Loki Helm values
## Chart: grafana/loki-stack
## Namespace: monitoring

loki:
  enabled: true
  isDefault: false

  # Grafana 10의 datasource 헬스체크(vector() 쿼리)는 Loki 2.9+ 필요
  image:
    tag: 2.9.3

  config:
    auth_enabled: false
    server:
      http_listen_port: 3100
    ingester:
      chunk_idle_period: 3m
      chunk_block_size: 262144
      chunk_retain_period: 1m
      lifecycler:
        ring:
          kvstore:
            store: inmemory
          replication_factor: 1
    limits_config:
      retention_period: 168h
      reject_old_samples: true
      reject_old_samples_max_age: 168h
    schema_config:
      configs:
        - from: "2020-10-24"
          store: boltdb-shipper
          object_store: filesystem
          schema: v11
          index:
            prefix: index_
            period: 24h
    storage_config:
      boltdb_shipper:
        active_index_directory: /data/loki/boltdb-shipper-active
        cache_location: /data/loki/boltdb-shipper-cache
        cache_ttl: 24h
        shared_store: filesystem
      filesystem:
        directory: /data/loki/chunks
    chunk_store_config:
      max_look_back_period: 0s
    table_manager:
      retention_deletes_enabled: false
      retention_period: 0s
    compactor:
      working_directory: /data/loki/boltdb-shipper-compactor
      shared_store: filesystem

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 512Mi

  persistence:
    enabled: false

  service:
    type: ClusterIP
    port: 3100

## Disable bundled Promtail in loki-stack (we use Fluent Bit separately)
promtail:
  enabled: false

## Disable Grafana from loki-stack (we use kube-prometheus-stack's Grafana)
grafana:
  enabled: false
