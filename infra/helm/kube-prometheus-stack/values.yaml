## kube-prometheus-stack Helm values
## Chart: prometheus-community/kube-prometheus-stack
## Namespace: monitoring

grafana:
  enabled: true
  adminPassword: admin
  persistence:
    enabled: false
  service:
    type: NodePort
    nodePort: 30000
  sidecar:
    datasources:
      enabled: true
      defaultDatasourceEnabled: true
    dashboards:
      enabled: true
      searchNamespace: ALL
  deleteDatasources:
    - name: Jaeger
      orgId: 1
  additionalDataSources:
    - name: Tempo
      uid: tempo
      type: tempo
      url: http://tempo.tracing:3200
      jsonData:
        tracesToLogsV2:
          datasourceUid: loki
          filterByTraceID: true
          filterBySpanID: false
        tracesToMetrics:
          datasourceUid: prometheus
        nodeGraph:
          enabled: true
        serviceMap:
          datasourceUid: prometheus
    - name: Loki
      uid: loki
      type: loki
      url: http://loki.monitoring:3100
      jsonData:
        derivedFields:
          - name: TraceID
            matcherRegex: '"?trace_id"?[=: ]+\"?([a-f0-9]{32})\"?'
            url: ""
            datasourceUid: tempo
            matcherType: regex

  grafana.ini:
    server:
      root_url: http://localhost:3000
    auth.anonymous:
      enabled: true
      org_role: Viewer

prometheus:
  prometheusSpec:
    retention: 24h
    serviceMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}
    ruleSelector: {}
    ruleNamespaceSelector: {}
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: "null"
    receivers:
      - name: "null"

kubeStateMetrics:
  enabled: true

nodeExporter:
  enabled: true

kubelet:
  enabled: true
  serviceMonitor:
    https: true
    cAdvisorRelabelings:
      - action: replace
        sourceLabels: [__metrics_path__]
        targetLabel: metrics_path
