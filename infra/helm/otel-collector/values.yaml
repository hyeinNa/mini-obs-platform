## OpenTelemetry Collector Helm values
## Chart: open-telemetry/opentelemetry-collector
## Namespace: tracing

mode: deployment

image:
  repository: otel/opentelemetry-collector-contrib
  tag: "0.96.0"

replicaCount: 1

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 512Mi

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP
  prometheus:
    enabled: true
    containerPort: 8889
    servicePort: 8889
    protocol: TCP

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

  processors:
    memory_limiter:
      limit_mib: 256
      spike_limit_mib: 64
      check_interval: 1s
    batch:
      timeout: 2s
      send_batch_size: 512

  exporters:
    otlp/tempo:
      endpoint: "tempo.tracing:4317"
      tls:
        insecure: true
    prometheus:
      endpoint: "0.0.0.0:8889"
      namespace: otelcol

  extensions:
    health_check:
      endpoint: "0.0.0.0:13133"

  service:
    extensions: [health_check]
    pipelines:
      traces:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [otlp/tempo]
      metrics:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [prometheus]
